<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree Inventory Analyzer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --text: #1a1a18;
      --text-muted: #6b6b67;
      --border: rgba(0,0,0,0.12);
      --border-strong: rgba(0,0,0,0.25);
      --accent: #3266ad;
      --accent2: #1D9E75;
      --radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #2a2a28;
        --text: #f0efea;
        --text-muted: #9a9a94;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.22);
        --accent: #5a8fd4;
        --accent2: #3ecb96;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    header {
      border-bottom: 0.5px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 17px; font-weight: 500; }
    header .subtitle { font-size: 13px; color: var(--text-muted); margin-left: auto; }

    main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Upload */
    #drop-zone {
      border: 1.5px dashed var(--border-strong);
      border-radius: var(--radius);
      padding: 3rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    #drop-zone:hover, #drop-zone.over { background: var(--bg-secondary); }
    #drop-zone i { font-size: 2rem; color: var(--text-muted); display: block; margin-bottom: 10px; }
    #drop-zone p { margin: 4px 0; }
    #drop-zone .hint { font-size: 13px; color: var(--text-muted); }
    #file-input { display: none; }

    /* Dashboard */
    #main { display: none; }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px;
    }
    .top-bar .file-info { font-weight: 500; }
    .top-bar .record-count { font-size: 13px; color: var(--text-muted); margin-left: 8px; }
    button.reset-btn {
      font-size: 12px; padding: 5px 12px; cursor: pointer;
      background: none; border: 0.5px solid var(--border-strong);
      border-radius: 6px; color: var(--text); font-family: inherit;
    }
    button.reset-btn:hover { background: var(--bg-secondary); }

    .debug-box {
      font-size: 11px; color: var(--text-muted);
      background: var(--bg-secondary);
      border-radius: 6px; padding: 7px 10px;
      margin-bottom: 1.25rem;
    }
    .debug-box strong { color: var(--text); }

    /* Stat cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
    }
    .stat-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-card .value { font-size: 22px; font-weight: 500; }
    .stat-card .value span { font-size: 14px; font-weight: 400; }

    /* Tabs */
    .tabs {
      display: flex; gap: 0;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .tab-btn {
      background: none; border: none;
      border-bottom: 2px solid transparent;
      padding: 8px 16px; font-size: 14px;
      cursor: pointer; color: var(--text-muted);
      font-family: inherit; transition: color 0.1s;
      margin-bottom: -0.5px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { border-bottom-color: var(--text); color: var(--text); font-weight: 500; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Section titles */
    .section-title {
      font-size: 12px; font-weight: 500; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin: 1.5rem 0 0.75rem;
    }
    .section-title:first-child { margin-top: 0; }

    /* Bar rows */
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 13px; }
    .bar-label {
      min-width: 140px; max-width: 200px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--text-muted);
    }
    .bar-track { flex: 1; height: 16px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .bar-count { min-width: 60px; text-align: right; color: var(--text-muted); }

    /* Summary table */
    table.summary { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.summary th {
      text-align: left; padding: 6px 8px; font-weight: 500;
      border-bottom: 0.5px solid var(--border); color: var(--text-muted); font-size: 12px;
    }
    table.summary td { padding: 7px 8px; border-bottom: 0.5px solid var(--border); }

    /* Charts */
    .chart-wrap { position: relative; width: 100%; height: 260px; margin-top: 1.25rem; }

    /* Inclusion zone note */
    .inclusion-note {
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-top: 1.5rem;
      font-size: 13px;
      color: var(--text-muted);
    }
    .inclusion-note strong { color: var(--text); display: block; margin-bottom: 4px; }

    .empty-msg { font-size: 13px; color: var(--text-muted); padding: 1rem 0; }
  </style>
</head>
<body>

<header>
  <i class="fa-solid fa-tree" style="color: var(--accent2); font-size: 18px;"></i>
  <h1>Tree Inventory Analyzer</h1>
  <span class="subtitle">KoBoToolbox CSV · v1.0</span>
</header>

<main>

  <!-- Upload -->
  <div id="upload-section">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <i class="fa-solid fa-file-csv"></i>
      <p style="font-weight:500;">Drop your CSV file here</p>
      <p class="hint">or click to browse &mdash; comma or semicolon separated</p>
    </div>
    <input type="file" id="file-input" accept=".csv">
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="top-bar">
      <div>
        <span class="file-info" id="file-name"></span>
        <span class="record-count" id="row-count"></span>
      </div>
      <button class="reset-btn" onclick="resetApp()">&#x21BA; New file</button>
    </div>

    <div class="debug-box" id="debug-info"></div>

    <div class="stat-grid" id="top-stats"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('species')">Species</button>
      <button class="tab-btn" onclick="switchTab('health')">Health</button>
      <button class="tab-btn" onclick="switchTab('origin')">Origin</button>
      <button class="tab-btn" onclick="switchTab('quality')">Quality</button>
      <button class="tab-btn" onclick="switchTab('use')">Use</button>
      <button class="tab-btn" onclick="switchTab('dims')">Dimensions</button>
      <button class="tab-btn" onclick="switchTab('volume')">Volume</button>
    </div>

    <div id="tab-species" class="tab-panel active"></div>
    <div id="tab-health"  class="tab-panel"></div>
    <div id="tab-origin"  class="tab-panel"></div>
    <div id="tab-quality" class="tab-panel"></div>
    <div id="tab-use"     class="tab-panel"></div>

    <div id="tab-dims" class="tab-panel">
      <div id="dims-stats"></div>
      <div class="chart-wrap"><canvas id="diam-chart" role="img" aria-label="Diameter histogram"></canvas></div>
      <div class="chart-wrap"><canvas id="ht-chart"   role="img" aria-label="Height histogram"></canvas></div>
    </div>

    <div id="tab-volume" class="tab-panel">
      <div id="volume-stats"></div>
      <div class="chart-wrap" style="height:320px;"><canvas id="volume-chart" role="img" aria-label="Volume per ha by plot"></canvas></div>
    </div>
  </div>

</main>

<script src="js/calculations.js"></script>
<script src="js/app.js"></script>
</body>
</html>
