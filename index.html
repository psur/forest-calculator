<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forest Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-secondary: #f5f5f3; --text: #1a1a18; --text-muted: #6b6b67;
      --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.25);
      --accent: #3266ad; --accent2: #1D9E75; --radius: 10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg-secondary: #2a2a28; --text: #f0efea; --text-muted: #9a9a94;
        --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.22);
        --accent: #5a8fd4; --accent2: #3ecb96;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
    header { border-bottom: 0.5px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 17px; font-weight: 500; }
    header .subtitle { font-size: 13px; color: var(--text-muted); margin-left: auto; }
    main { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Upload */
    #drop-zone { border: 1.5px dashed var(--border-strong); border-radius: var(--radius); padding: 3rem 1.5rem; text-align: center; cursor: pointer; transition: background 0.15s; }
    #drop-zone:hover, #drop-zone.over { background: var(--bg-secondary); }
    #drop-zone i { font-size: 2rem; color: var(--text-muted); display: block; margin-bottom: 10px; }
    #drop-zone p { margin: 4px 0; }
    #drop-zone .hint { font-size: 13px; color: var(--text-muted); }
    #file-input { display: none; }

    /* Dashboard */
    #dashboard { display: none;  width: 100%; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
    .top-bar .file-info { font-weight: 500; }
    .top-bar .record-count { font-size: 13px; color: var(--text-muted); margin-left: 8px; }
    button.reset-btn { font-size: 12px; padding: 5px 12px; cursor: pointer; background: none; border: 0.5px solid var(--border-strong); border-radius: 6px; color: var(--text); font-family: inherit; }
    button.reset-btn:hover { background: var(--bg-secondary); }
    .debug-box { font-size: 11px; color: var(--text-muted); background: var(--bg-secondary); border-radius: 6px; padding: 7px 10px; margin-bottom: 1.25rem; }
    .debug-box strong { color: var(--text); }

    /* Stat cards */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg-secondary); border-radius: var(--radius); padding: 0.9rem 1rem; }
    .stat-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-card .value { font-size: 22px; font-weight: 500; }
    .stat-card .value span { font-size: 14px; font-weight: 400; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 8px 16px; font-size: 14px; cursor: pointer; color: var(--text-muted); font-family: inherit; transition: color 0.1s; margin-bottom: -0.5px; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { border-bottom-color: var(--text); color: var(--text); font-weight: 500; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .section-title { font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 1.5rem 0 0.75rem; }
    .section-title:first-child { margin-top: 0; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 13px; }
    .bar-label { min-width: 140px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); }
    .bar-track { flex: 1; height: 16px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .bar-count { min-width: 60px; text-align: right; color: var(--text-muted); }

    table.summary { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.summary th { text-align: right; padding: 6px 8px; font-weight: 500; border-bottom: 0.5px solid var(--border); color: var(--text-muted); font-size: 12px; }
    table.summary th:first-child { text-align: left; }
    table.summary td { padding: 7px 8px; border-bottom: 0.5px solid var(--border); text-align: right; }
    table.summary td:first-child { text-align: left; }
    table.summary tr.total-row td { font-weight: 600; background: var(--bg-secondary); border-top: 1px solid var(--border-strong); }
    .chart-wrap { position: relative; width: 100%; height: 260px; margin-top: 1.25rem; }
    .empty-msg { font-size: 13px; color: var(--text-muted); padding: 1rem 0; }
    .zone-table-wrap { overflow-x: auto; margin-top: 0.5rem; }

    /* Zone upload panel */
    .zone-upload-panel { border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; }
    .zone-upload-panel h3 { font-size: 14px; font-weight: 500; margin-bottom: 1rem; }
    .upload-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
    .upload-file-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border: 0.5px solid var(--border-strong); border-radius: 6px; cursor: pointer; font-size: 13px; background: none; color: var(--text); font-family: inherit; white-space: nowrap; }
    .upload-file-btn:hover { background: var(--bg-secondary); }
    .upload-file-btn.loaded { border-color: var(--accent2); color: var(--accent2); }
    .upload-file-btn i { font-size: 13px; }
    .file-loaded-name { font-size: 12px; color: var(--accent2); }
    .calc-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
    .calc-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .calc-btn:not(:disabled):hover { opacity: 0.85; }
    .upload-status { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
    .upload-status .ok { color: var(--accent2); }
    .upload-status .missing { color: #D85A30; }
  </style>
</head>
<body>

<header>
  <i class="fa-solid fa-tree" style="color: var(--accent2); font-size: 18px;"></i>
  <h1>Forest Calculator</h1>
  <span class="subtitle">KoBoToolbox CSV · v1.1</span>
</header>

<main>

  <!-- Step 1: Upload tree data -->
  <div id="upload-section">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <i class="fa-solid fa-file-csv"></i>
      <p style="font-weight:500;">Drop tree measurement CSV here</p>
      <p class="hint">or click to browse — KoBoToolbox export</p>
    </div>
    <input type="file" id="file-input" accept=".csv">
  </div>

  <!-- Dashboard (shown after tree CSV loaded) -->
  <div id="dashboard">
    <div class="top-bar">
      <div>
        <span class="file-info" id="file-name"></span>
        <span class="record-count" id="row-count"></span>
      </div>
      <button class="reset-btn" onclick="resetApp()">&#x21BA; New file</button>
    </div>

    <div class="debug-box" id="debug-info"></div>
    <div class="stat-grid" id="top-stats"></div>

    <div class="tabs" id="tab-bar">
      <button class="tab-btn active" data-tab="species" onclick="switchTab('species')">Species</button>
      <button class="tab-btn" data-tab="genus"   onclick="switchTab('genus')">Genus</button>
      <button class="tab-btn" data-tab="health"  onclick="switchTab('health')">Health</button>
      <button class="tab-btn" data-tab="origin"  onclick="switchTab('origin')">Origin</button>
      <button class="tab-btn" data-tab="quality" onclick="switchTab('quality')">Quality</button>
      <button class="tab-btn" data-tab="dims"    onclick="switchTab('dims')">Dimensions</button>
      <button class="tab-btn" data-tab="volume"  onclick="switchTab('volume')">Volume</button>
      <button class="tab-btn" data-tab="zones"   onclick="switchTab('zones')">Zones</button>
    </div>

    <div id="tab-species" class="tab-panel active"></div>
    <div id="tab-genus"   class="tab-panel"></div>
    <div id="tab-health"  class="tab-panel"></div>
    <div id="tab-origin"  class="tab-panel"></div>
    <div id="tab-quality" class="tab-panel"></div>
    

    <div id="tab-dims" class="tab-panel">
      <div id="dims-stats"></div>
      <div class="chart-wrap"><canvas id="diam-chart"></canvas></div>
      <div class="chart-wrap"><canvas id="ht-chart"></canvas></div>
    </div>

    <div id="tab-volume" class="tab-panel">
      <div id="volume-stats"></div>
      <div class="chart-wrap" style="height:320px;"><canvas id="volume-chart"></canvas></div>
    </div>

    <div id="tab-zones" class="tab-panel">
      <!-- Upload panel always visible in Zones tab -->
      <div class="zone-upload-panel">
        <h3><i class="fa-solid fa-folder-open" style="margin-right:6px;color:var(--text-muted)"></i>Additional files for zone volume calculation</h3>
        <div class="upload-row">
          <button class="upload-file-btn" id="btn-plots" onclick="document.getElementById('input-plots').click()">
            <i class="fa-solid fa-table"></i> Plots CSV
          </button>
          <span class="file-loaded-name" id="name-plots">not loaded</span>
          <input type="file" id="input-plots" accept=".csv" style="display:none">
        </div>
        <div class="upload-row">
          <button class="upload-file-btn" id="btn-zones" onclick="document.getElementById('input-zones').click()">
            <i class="fa-solid fa-map"></i> Zones CSV
          </button>
          <span class="file-loaded-name" id="name-zones">not loaded</span>
          <input type="file" id="input-zones" accept=".csv" style="display:none">
        </div>
        <div class="upload-status" id="upload-status">
          <span class="missing">&#x25CF; Plots CSV</span> &nbsp;
          <span class="missing">&#x25CF; Zones CSV</span>
        </div>
        <div style="margin-top:1rem;">
          <button class="calc-btn" id="calc-zones-btn" onclick="runZoneCalculation()" disabled>
            <i class="fa-solid fa-calculator"></i> Calculate zone volumes
          </button>
        </div>
      </div>
      <div id="zones-result"></div>
    </div>

  </div>

</main>

<script src="js/calculations.js"></script>
<script src="js/app.js"></script>
</body>
</html>
